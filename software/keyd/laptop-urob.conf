# ----------------------------------------------------
# BASE LAYOUT (Colemak-DH - Active by default)
# ----------------------------------------------------
[main]
# Left Thumbs
leftmeta = layer(nav_layer)              # Outer Left -> NAV Layer
leftalt = overload(fn_layer, enter)      # Inner Left -> FN / Enter
# Space is just space!

# Right Thumbs
rightalt = overload(num_layer, oneshot(num_layer))      # Inner Right -> NUM (smart_num)
rightmeta = overload(shift, oneshot(shift))            # Outer Right -> SHIFT (smart_shift)

# Dedicated IME Switcher (Toggles Vietnamese layout & IME)
capslock = command(/usr/local/bin/keyd-layout-mode toggle-vietnamese)

# Top Row
q = q
w = w
e = f
r = p
t = b
y = j
u = l
i = u
o = y
p = '

# Home Row (Home Row Mods!)
# syntax: overloadt(modifier, tap_letter, timeout_ms)
a = overloadt(meta, a, 200)
s = overloadt(alt, r, 200)
d = overloadt(shift, s, 200)
f = overloadt(control, t, 200)
g = g

h = m
j = overloadt(control, n, 200)
k = overloadt(shift, e, 200)
l = overloadt(alt, i, 200)
semicolon = overloadt(meta, o, 200)

# Bottom Row
z = z
x = x
c = c
v = d
b = v
n = k
m = h
comma = ,
dot = .
# slash (bottom-right key) falls through as standard / and ?

# ----------------------------------------------------
# HORIZONTAL COMBOS (Chords)
# ----------------------------------------------------
# -- Left Hand Horizontal Combos --
w+e = esc
s+d = tab
x+v = C-x
x+c = C-c
c+v = C-v

# -- Right Hand Horizontal Combos --
j+k = (
k+l = )
m+comma = [
comma+dot = ]
u+i = backspace
i+o = delete

# ----------------------------------------------------
# TOGGLE TO QWERTY LAYOUT
# ----------------------------------------------------
# [meta+alt+shift]
# t = command(/usr/local/bin/keyd-layout-mode toggle-qwerty)
# f = command(/usr/local/bin/keyd-layout-mode toggle-qwerty)


# ----------------------------------------------------
# PUNCTUATION MORPHS & SHIFT COMBOS (base layout)
# ----------------------------------------------------
[shift]
# comma_morph: Shift+comma = semicolon
comma = ;
# dot_morph: Shift+dot = colon
dot = :
capslock = command(/usr/local/bin/keyd-layout-mode toggle-qwerty)

# -- Right Hand Horizontal Combos with Shift --
j+k = <
k+l = >
m+comma = {
comma+dot = }

[control+shift]
# comma_morph: Ctrl+Shift+comma = less-than
comma = <
# dot_morph: Ctrl+Shift+dot = greater-than
dot = >


# ----------------------------------------------------
# LAYERS
# ----------------------------------------------------

[nav_layer]
# Left Hand Top Row
q = A-f4
e = S-tab
r = A-tab

# Left Hand Middle Row (Oneshot mods)
a = oneshot(meta)
s = oneshot(alt)
d = oneshot(shift)
f = oneshot(control)

# Right Hand Top Row
y = pageup
u = timeout(backspace, 200, C-backspace)
i = timeout(up, 200, C-home)
o = timeout(delete, 200, C-delete)

# Right Hand Middle Row
h = pagedown
j = timeout(left, 200, home)
k = timeout(down, 200, C-end)
l = timeout(right, 200, end)
semicolon = enter

# Right Hand Bottom Row
n = insert
m = tab

# Combos in Nav Layer
j+k = <
k+l = >
m+comma = {
comma+dot = }


[num_layer]
# Left Hand Top Row
w = 7
e = 8
r = 9

# Left Hand Middle Row (Home row mods)
a = overloadt(meta, 0, 200)
s = overloadt(alt, 4, 200)
d = overloadt(shift, 5, 200)
f = overloadt(control, 6, 200)

# Left Hand Bottom Row
x = 1
c = 2
v = 3


[fn_layer]
# Left Hand Top Row
q = f12
w = f7
e = f8
r = f9

# Left Hand Middle Row (Home row mods)
a = overloadt(meta, f11, 200)
s = overloadt(alt, f4, 200)
d = overloadt(shift, f5, 200)
f = overloadt(control, f6, 200)

# Left Hand Bottom Row
z = f10
x = f1
c = f2
v = f3

# Right Hand Top Row
u = previoussong
i = volumeup
o = nextsong

# Right Hand Middle Row (Home row mods)
j = overloadt(control, M-C-left, 200)
k = overloadt(shift, volumedown, 200)
l = overloadt(alt, M-C-right, 200)

# Right Hand Bottom Row
n = M-C-S-a
m = M-C-S-q
comma = A-grave

# Right Thumbs
rightalt = mute
rightmeta = playpause


[nav_layer+fn_layer+shift]
t = command(/usr/local/bin/keyd-layout-mode toggle-qwerty)
f = command(/usr/local/bin/keyd-layout-mode toggle-qwerty)